<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ölmezler Alüminyum</title>

<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<defs>
<linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'>
<stop offset='0%' stop-color='%23fff3b0'/>
<stop offset='40%' stop-color='%23ffd700'/>
<stop offset='100%' stop-color='%23b8860b'/>
</linearGradient>
</defs>

<rect width='100' height='100' rx='20' fill='black'/>
<path d='M50 10 L60 40 L90 40 L65 60 L75 90 L50 72 L25 90 L35 60 L10 40 L40 40 Z'
fill='url(%23g)'/>
</svg>">

<style>
:root { --gold: #d4af37; }

html { scroll-behavior: smooth; }

body {
    margin: 0;
    padding-top: 60px;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    background: linear-gradient(rgba(10,10,10,0.82), rgba(10,10,10,0.88)),
                url('https://picsum.photos/id/1015/1920/1080') center/cover fixed;
}

/* TOPBAR */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    padding: 0 20px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    z-index: 1000;
}

.logo {
    font-weight: 800;
    font-size: 18px;
    margin-right: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(90deg,#b8860b,#ffd700,#fff4b0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* MENU */
.menu {
    display: flex;
    align-items: center;
}

/* DROPDOWN */
.dropdown {
    position: relative;
    margin-left: 25px;
    cursor: pointer;
    font-weight: 500;
    user-select: none;
    padding: 10px;
}

.dropdown-menu {
    display: none;
    position: absolute;
    top: 40px;
    left: 0;
    background: rgba(0,0,0,0.95);
    min-width: 180px;
    border-radius: 8px;
    overflow: hidden;
    z-index: 999;
}

.dropdown-menu a {
    display: block;
    padding: 10px;
    color: white;
    text-decoration: none;
    border-bottom: 1px solid #222;
}

.dropdown-menu a:hover {
    background: #222;
}

.dropdown:hover .dropdown-menu {
    display: block;
}

/* SOSYAL İKONLAR */
.social-icons{
    display:flex;
    align-items:center;
    gap:10px;
    margin-left:10px;
}

.social-icons img{
    width:22px;
    height:22px;
    cursor:pointer;
    transition:0.2s;
}

.social-icons img:hover{
    transform:scale(1.2);
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: linear-gradient(rgba(10,10,10,0.65),rgba(10,10,10,0.75)),
                url('https://picsum.photos/id/1015/1920/1080') center/cover;
    text-align: center;
    padding: 20px;
    position: relative;
}

/* YUMUŞAK GEÇİŞ */
.hero::after {
    content: "";
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 120px;
    background: linear-gradient(to bottom, rgba(10,10,10,0) 0%, rgba(10,10,10,0.9) 100%);
    pointer-events: none;
}

.hero h1 {
    font-size: 3.5rem;
    margin-bottom: 20px;
}

.hero p {
    max-width: 900px;
    font-size: 16px;
    line-height: 1.6;
    color: #ddd;
}

/* SECTION */
.section {
    padding: 90px 20px;
    text-align: center;
}

h2 {
    font-size: 2.5rem;
    color: var(--gold);
}

.project-grid {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.project-card {
    width: 300px;
    cursor: pointer;
}

.project-card img {
    width: 100%;
    border-radius: 12px;
}

/* 🔥 GOOGLE MAP (EKLENDİ) */
.map {
    width: 60%;
    height: 250px;
    margin: 50px auto 0;
    border: none;
    border-radius: 12px;
    transition: 0.4s;
}

.map:hover {
    width: 90%;
    height: 400px;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 55px;
    height: 55px;
    background: #25D366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.whatsapp img {
    width: 28px;
    height: 28px;
}

.whatsapp-tooltip {
    position: absolute;
    bottom: 65px;
    right: 0;
    background: rgba(0,0,0,0.9);
    padding: 8px;
    border-radius: 8px;
    font-size: 12px;
    display: none;
}

.whatsapp:hover .whatsapp-tooltip {
    display: block;
}

/* CANLI DESTEK */
.chat-btn {
    position: fixed;
    right: 20px;
    bottom: 90px;
    background: #d4af37;
    color: black;
    padding: 10px 14px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    z-index: 9999;
}

.chat-box {
    position: fixed;
    right: 20px;
    bottom: 140px;
    width: 260px;
    height: 320px;
    background: #111;
    border: 1px solid #333;
    border-radius: 12px;
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
}

.chat-header {
    background: #d4af37;
    color: black;
    padding: 10px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
}

.chat-body {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    font-size: 13px;
}

.msg {
    margin: 5px 0;
    padding: 6px 8px;
    border-radius: 8px;
    max-width: 80%;
}

.user {
    background: #25D366;
    color: black;
    margin-left: auto;
}

.bot {
    background: #222;
    color: white;
}

.chat-input {
    display: flex;
    border-top: 1px solid #333;
}

.chat-input input {
    flex: 1;
    padding: 8px;
    border: none;
    outline: none;
    background: #000;
    color: white;
}

.chat-input button {
    background: #d4af37;
    border: none;
    padding: 8px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="topbar">
    <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#d4af37">
            <path d="M12 2L2 7l10 5 10-5-10-5zm0 7L2 4v14l10 6 10-6V4l-10 5z"/>
        </svg>
        ÖLMEZLER ALÜMİNYUM
    </div>

    <div class="menu">
        <div class="dropdown">Ana Sayfa
            <div class="dropdown-menu">
                <a href="#home">Giriş</a>
                <a href="#projects">Projeler</a>
            </div>
        </div>

        <div class="dropdown">Projeler
            <div class="dropdown-menu">
                <a href="#">Adana</a>
                <a href="#">Mersin</a>
                <a href="#">Hatay</a>
            </div>
        </div>

        <div class="dropdown">Hakkımızda
            <div class="dropdown-menu">
                <a href="#">Firma</a>
                <a href="#">Vizyon</a>
                <a href="#">Misyon</a>
            </div>
        </div>

        <div class="dropdown">İletişim
            <div class="dropdown-menu">
                <a href="#">Telefon</a>
                <a href="#">WhatsApp</a>
                <a href="#">E-posta</a>
            </div>
        </div>

        <div class="social-icons">
            <a href="https://facebook.com" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
            </a>
        </div>
    </div>
</div>

<div class="hero" id="home">
    <h1>Kaliteli Cephe Sistemleri</h1>
    <p>Ölmezler Alüminyum modern yapı çözümleri sunar.</p>
</div>

<div class="section" id="projects">
    <h2>Projelerimiz</h2>

    <div class="project-grid">
        <div class="project-card"><img src="https://picsum.photos/id/1015/600/400"></div>
        <div class="project-card"><img src="https://picsum.photos/id/133/600/400"></div>
        <div class="project-card"><img src="https://picsum.photos/id/201/600/400"></div>
    </div>

    <!-- GOOGLE MAP EKLENDİ -->
    <iframe 
        class="map"
        src="https://maps.google.com/maps?q=Şakirpaşa%2042099.%20Sk.%20No:20%20Seyhan%20Adana&output=embed">
    </iframe>

</div>

<!-- WHATSAPP -->
<div class="whatsapp" onmouseenter="setWhatsAppInfo()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
    <div class="whatsapp-tooltip" id="waText"></div>
</div>

<!-- CANLI DESTEK -->
<div class="chat-btn" onclick="toggleChat()">💬 Canlı Destek</div>

<div class="chat-box" id="chatBox">
    <div class="chat-header">
        Destek
        <span onclick="toggleChat()" style="cursor:pointer;">✖</span>
    </div>

    <div class="chat-body" id="chatBody">
        <div class="msg bot">Merhaba 👋 Nasıl yardımcı olabiliriz?</div>
    </div>

    <div class="chat-input">
        <input id="msg" placeholder="Mesaj yaz...">
        <button onclick="sendMsg()">Gönder</button>
    </div>
</div>

<script>
function setWhatsAppInfo(){
    const num = "+90 5" + Math.floor(100000000 + Math.random()*900000000);
    document.getElementById("waText").innerText =
        "İbrahim Ölmezler\n" + num;
}

function toggleChat(){
    const box = document.getElementById("chatBox");
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function sendMsg(){
    const input = document.getElementById("msg");
    if(!input.value) return;

    const body = document.getElementById("chatBody");

    const user = document.createElement("div");
    user.className = "msg user";
    user.innerText = input.value;
    body.appendChild(user);

    input.value = "";

    setTimeout(()=>{
        const bot = document.createElement("div");
        bot.className = "msg bot";
        bot.innerText = "En kısa sürede dönüş yapacağız 👍";
        body.appendChild(bot);
    }, 700);
}
</script>

</body>
</html>
